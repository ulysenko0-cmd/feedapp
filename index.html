<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Р”РІРёР¶РөРҪРёРө РәРҫСҖРјРҫРІ</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<!-- XLSX РіСҖСғР·РёСӮСҒСҸ Р»РөРҪРёРІРҫ вҖ” СӮРҫР»СҢРәРҫ РҝСҖРё РҝРөСҖРІРҫРј СҚРәСҒРҝРҫСҖСӮРө РІ Excel -->
<style>
/* ============================================================
   PALETTE вҖ” В«РҹРҫР»Рө РІ СҶРёС„СҖРөВ»
   Р—РҫР»РҫСӮРҫ РҝСҲРөРҪРёСҶСӢ В· Р—РөР»РөРҪСҢ Р»СғРіР° В· Р§РөСҖРҪРҫР·С‘Рј В· Р СҸРұРёРҪР°
   ============================================================ */
:root {
  /* Backgrounds вҖ” СӮС‘РјРҪР°СҸ СӮРөРјР° (РҫСҒРҪРҫРІРҪР°СҸ) */
  --bg:       #141a0e;   /* РіР»СғРұРҫРәРёР№ СҮРөСҖРҪРҫР·С‘Рј */
  --s1:       #1c2414;   /* СӮС‘РјРҪР°СҸ Р·РөР»РөРҪСҢ РҝРҫСҮРІСӢ */
  --s2:       #243019;   /* СҮСғСӮСҢ СҒРІРөСӮР»РөРө */
  --s3:       #2f3d20;   /* РіСҖР°РҪРёСҶР° */
  --border:   #3a4e27;

  /* РҗРәСҶРөРҪСӮСӢ */
  --gold:     #f5c842;   /* РҝСҲРөРҪРёСҶР° */
  --gold2:    #e8a020;   /* СҸРҪСӮР°СҖСҢ */
  --gold-d:   rgba(245,200,66,.15);
  --lime:     #8fce3a;   /* РјРҫР»РҫРҙР°СҸ СӮСҖР°РІР° */
  --lime-d:   rgba(143,206,58,.14);
  --red:      #e8402a;   /* СҖСҸРұРёРҪР° */
  --red-d:    rgba(232,64,42,.14);
  --sky:      #5bbfff;   /* РҪРөРұРҫ */
  --sky-d:    rgba(91,191,255,.13);
  --cream:    #f0ead0;   /* СҒРҫР»РҫРјР° */

  /* РўРөРәСҒСӮ */
  --text:     #e8edd6;
  --muted:    #7a8f5c;
  --muted2:   #526038;

  --radius: 14px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);

  /* Fonts */
  --f-display: 'Unbounded', sans-serif;
  --f-body:    'Nunito', sans-serif;
}

/* Light override when Telegram is in light mode */
body.tg-light {
  --bg:#f5f0e0; --s1:#fffdf5; --s2:#f0ead0; --s3:#e0d9bb;
  --border:#c8bf9a; --text:#1a2210; --muted:#6b7a4a; --muted2:#9aa870;
}

* { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html, body { height:100%; overflow:hidden; }
body {
  font-family: var(--f-body);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  display: flex;
  flex-direction: column;
}

/* ---- SVG FIELD TEXTURE (CSS only) ---- */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    radial-gradient(ellipse 120% 60% at 50% -10%, rgba(143,206,58,.08) 0%, transparent 60%),
    repeating-linear-gradient(
      92deg,
      transparent 0px,
      transparent 18px,
      rgba(143,206,58,.025) 18px,
      rgba(143,206,58,.025) 19px
    );
  pointer-events: none;
  z-index: 0;
}

/* ---- BOTTOM NAV ---- */
.bnav {
  display: flex;
  background: var(--s1);
  border-top: 2px solid var(--border);
  padding-bottom: var(--safe-bottom);
  flex-shrink: 0;
  z-index: 100;
  position: relative;
}
.bnav::before {
  content: '';
  position: absolute;
  top: -1px; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), var(--lime), var(--gold), transparent);
}
.bni {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  padding: 8px 4px 7px; gap: 3px;
  border: none; background: transparent;
  color: var(--muted); cursor: pointer;
  font-size: 8.5px; font-weight: 800;
  letter-spacing: .4px; text-transform: uppercase;
  font-family: var(--f-body);
  transition: color .2s;
  position: relative;
}
.bni .ico { font-size: 20px; line-height: 1; transition: transform .2s; }
.bni.on { color: var(--gold); }
.bni.on .ico { transform: scale(1.15); }
.bni.on::after {
  content: '';
  position: absolute; bottom: 0; left: 25%; right: 25%; height: 2px;
  background: var(--gold); border-radius: 2px 2px 0 0;
}
.bni:disabled { opacity:.3; cursor:default; }

/* ---- PAGES ---- */
.pages { flex:1; overflow:hidden; position:relative; z-index:1; }
.page { position:absolute; inset:0; overflow-y:auto; padding:12px; display:none; }
.page.on { display:block; }
.page::-webkit-scrollbar { display:none; }

/* ---- HEADER HERO ---- */
.hero {
  background: linear-gradient(135deg, #1e2f0f 0%, #2a3d14 50%, #1a2a0c 100%);
  border-radius: var(--radius);
  padding: 16px 16px 14px;
  margin-bottom: 10px;
  position: relative;
  overflow: hidden;
  border: 1px solid var(--border);
}
.hero::before {
  content: 'рҹҢҫ';
  position: absolute; right: -8px; top: -8px;
  font-size: 80px; opacity: .08;
  transform: rotate(15deg);
}
.hero::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--lime), var(--gold), var(--lime));
}
.hero-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
.hero-title {
  font-family: var(--f-display);
  font-size: 11px; font-weight: 900;
  color: var(--gold);
  letter-spacing: 1px;
  text-transform: uppercase;
}
.hero-user {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 700; color: var(--text);
}

/* ---- SITE TOGGLE ---- */
.site-toggle {
  display: flex;
  background: var(--s3);
  border-radius: 10px;
  padding: 3px;
  gap: 3px;
  margin-bottom: 10px;
  border: 1px solid var(--border);
}
.site-btn {
  flex: 1; padding: 9px 6px; border-radius: 8px;
  border: none; background: transparent;
  color: var(--muted); font-weight: 800; font-size: 12px;
  cursor: pointer; font-family: var(--f-body);
  transition: all .2s; white-space: nowrap; text-align: center;
  line-height: 1.2;
}
.site-btn small { display:block; font-size:9px; font-weight:600; opacity:.7; margin-top:2px; }
.site-btn.on {
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  color: #141a0e;
  box-shadow: 0 2px 8px rgba(245,200,66,.3);
}
.site-btn:disabled { opacity:.35; cursor:default; }

/* ---- DATE NAV ---- */
.dnav {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px;
  background: var(--s1); border-radius: var(--radius);
  margin-bottom: 10px;
  border: 1px solid var(--border);
}
.dnavbtn {
  width: 36px; height: 36px; border-radius: 9px;
  background: var(--s2); border: 1px solid var(--border);
  color: var(--text); font-size: 20px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-weight: 700;
  transition: background .15s;
}
.dnavbtn:active { background: var(--s3); }
.dlabel {
  flex: 1; text-align: center;
  font-family: var(--f-display);
  font-size: 14px; font-weight: 700;
  color: var(--cream);
}

/* ---- FEED CARDS ---- */
.cards-scroll {
  display: flex; gap: 10px;
  overflow-x: auto; padding: 2px 2px 6px;
  -webkit-overflow-scrolling: touch;
  scroll-snap-type: x mandatory;
  margin-bottom: 10px;
}
.cards-scroll::-webkit-scrollbar { display:none; }

.fcard {
  flex-shrink: 0; width: 156px; scroll-snap-align: start;
  background: linear-gradient(160deg, var(--s1) 0%, var(--s2) 100%);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 12px 10px;
  position: relative; overflow: hidden;
  transition: transform .15s;
}
.fcard:active { transform: scale(.97); }
.fcard::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--lime), var(--gold));
}
.fcard.warn::before { background: linear-gradient(90deg, var(--gold2), var(--red)); }
.fcard.crit::before { background: var(--red); }
.fcard-ico {
  font-size: 22px; margin-bottom: 4px; display: block;
  filter: drop-shadow(0 1px 3px rgba(0,0,0,.3));
}
.fc-name {
  font-size: 10px; color: var(--muted);
  font-weight: 800; margin-bottom: 5px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  text-transform: uppercase; letter-spacing: .4px;
}
.fc-val {
  font-family: var(--f-display);
  font-size: 18px; font-weight: 900; line-height: 1;
  color: #3b2a16;
  text-shadow: 0 1px 0 rgba(255,255,255,.45);
  white-space: nowrap;
  overflow: hidden;
  font-variant-numeric: tabular-nums;
}
.fc-unit { font-size: 10px; color: #4b351c; font-family: var(--f-body); font-weight: 800; }
.pbar { height: 4px; background: var(--s3); border-radius: 2px; margin-top: 8px; overflow:hidden; }
.pbar-f { height:100%; border-radius:2px; background: linear-gradient(90deg, var(--lime), var(--gold)); transition: width .5s; }
.pbar-f.warn { background: linear-gradient(90deg, var(--gold2), var(--red)); }
.pbar-f.crit { background: var(--red); }
.fc-sub { display:flex; gap:7px; margin-top:7px; font-size:10px; font-weight:700; flex-wrap:wrap; }
.days-left {
  display: inline-flex; align-items:center; padding: 2px 7px;
  border-radius: 20px; font-size: 9px; font-weight: 800;
  background: rgba(232,64,42,.2); color: var(--red); border: 1px solid rgba(232,64,42,.3);
  margin-top: 4px;
}

/* ---- SECTION ---- */
.sec {
  background: var(--s1);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  overflow: hidden;
}
.sec-head {
  padding: 12px 15px 10px;
  font-size: 10px; font-weight: 800;
  text-transform: uppercase; letter-spacing: 1px;
  color: var(--muted);
  display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid var(--border);
  font-family: var(--f-body);
}
.sec-head .ico { font-size: 14px; }
.sec-body { padding: 12px 15px; }

/* ---- TABLE ---- */
.tbl { width:100%; border-collapse:collapse; font-size:12px; }
.tbl th {
  padding: 8px 8px; text-align:left;
  font-size: 9px; font-weight: 800;
  text-transform: uppercase; letter-spacing: .7px;
  color: var(--muted); border-bottom: 1px solid var(--border);
  white-space: nowrap; font-family: var(--f-body);
}
.tbl td { padding:8px 8px; border-bottom:1px solid rgba(58,78,39,.4); }
.tbl tr:last-child td { border:none; }
.tbl tr:nth-child(even) td { background: rgba(0,0,0,.06); }
.tname { font-weight: 700; font-family: var(--f-body); overflow-wrap:anywhere; }
.mono { font-variant-numeric: tabular-nums; font-weight: 700; white-space:nowrap; }
.tbl th:not(:first-child), .tbl td:not(:first-child) { text-align:right; }

/* ---- FORM ---- */
.form-group { margin-bottom: 14px; }
.form-group label {
  display: block; font-size: 10px; font-weight: 800;
  color: var(--muted); text-transform: uppercase;
  letter-spacing: .7px; margin-bottom: 6px;
  font-family: var(--f-body);
}
input, select, textarea {
  width: 100%;
  background: var(--s2);
  border: 1.5px solid var(--border);
  color: var(--text);
  padding: 12px 14px;
  border-radius: 10px;
  font-size: 15px; outline: none;
  transition: border-color .15s, box-shadow .15s;
  -webkit-appearance: none; appearance: none;
  font-family: var(--f-body); font-weight: 600;
}
input:focus, select:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(245,200,66,.12);
}
input[type=number] { font-variant-numeric: tabular-nums; }

/* ---- BUTTONS ---- */
.btn {
  width:100%; padding:15px; border-radius:12px;
  border:none; cursor:pointer; font-size:15px;
  font-weight:800; font-family: var(--f-body);
  transition: all .15s;
  display:flex; align-items:center; justify-content:center; gap:8px;
  letter-spacing: .3px;
}
.btn-gold {
  background: linear-gradient(135deg, var(--gold) 0%, var(--gold2) 100%);
  color: #141a0e;
  box-shadow: 0 4px 12px rgba(245,200,66,.25);
}
.btn-gold:active { transform: scale(.97); box-shadow: none; }
.btn-lime {
  background: linear-gradient(135deg, var(--lime) 0%, #6fa828 100%);
  color: #141a0e;
  box-shadow: 0 4px 12px rgba(143,206,58,.2);
}
.btn-lime:active { transform: scale(.97); }
.btn-ghost {
  background: var(--s2); color: var(--text);
  border: 1.5px solid var(--border);
}
.btn-ghost:active { background: var(--s3); }
.btn-sm { padding: 9px 16px; font-size: 12px; width:auto; border-radius: 9px; }
.btn-danger {
  background: var(--red-d); color: var(--red);
  border: 1px solid rgba(232,64,42,.3);
}

/* ---- ALERTS ---- */
.alert {
  padding: 11px 14px; border-radius: 10px;
  font-size: 13px; font-weight: 700;
  margin-bottom: 10px;
  display: flex; align-items: center; gap: 8px;
}
.alert-ok  { background: var(--lime-d);  border: 1px solid rgba(143,206,58,.3);  color: var(--lime); }
.alert-err { background: var(--red-d);   border: 1px solid rgba(232,64,42,.35);  color: var(--red); }
.alert-warn{ background: var(--gold-d);  border: 1px solid rgba(245,200,66,.3);  color: var(--gold); }
.alert-info{ background: var(--sky-d);   border: 1px solid rgba(91,191,255,.25); color: var(--sky); }

/* ---- LOG ENTRIES ---- */
.log-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid rgba(58,78,39,.4);
}
.log-item:last-child { border:none; }
.log-ico {
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--lime-d); border: 1px solid rgba(143,206,58,.2);
  display: flex; align-items:center; justify-content:center;
  font-size: 18px; flex-shrink:0;
}
.log-left { flex:1; }
.log-name { font-weight:800; font-size:13px; }
.log-meta { font-size:11px; color:var(--muted); margin-top:2px; }
.log-amt  { font-size:15px; font-weight:900; color:var(--lime); font-family:var(--f-display); }
.log-time { font-size:10px; color:var(--muted2); margin-top:2px; }

/* ---- ROLE CHIPS ---- */
.chip {
  display: inline-flex; align-items:center; gap: 4px;
  padding: 3px 9px; border-radius: 20px;
  font-size: 10px; font-weight: 800; letter-spacing: .3px;
  font-family: var(--f-body);
}
.chip-admin    { background: rgba(245,200,66,.18);  color: var(--gold);  border: 1px solid rgba(245,200,66,.3); }
.chip-operator { background: rgba(143,206,58,.18);  color: var(--lime);  border: 1px solid rgba(143,206,58,.3); }
.chip-viewer   { background: rgba(91,191,255,.15);  color: var(--sky);   border: 1px solid rgba(91,191,255,.25); }

/* ---- USER ROWS ---- */
.user-row {
  display: flex; align-items:center; gap:10px;
  padding: 11px 0; border-bottom: 1px solid rgba(58,78,39,.4);
}
.user-row:last-child { border:none; }
.user-avatar {
  width: 40px; height: 40px; border-radius: 12px;
  background: linear-gradient(135deg, var(--s3), var(--s2));
  border: 1px solid var(--border);
  display: flex; align-items:center; justify-content:center;
  font-size: 18px; flex-shrink:0;
}
.user-info { flex:1; }
.user-name { font-weight:800; font-size:13px; }
.user-meta { font-size:10px; color:var(--muted); margin-top:2px; }
.role-select {
  width:auto; padding: 6px 10px; font-size:12px;
  border-radius:8px; font-weight:700;
}

/* ---- UPLOAD ---- */
.upload-box {
  border: 2px dashed var(--border); border-radius: 12px;
  padding: 28px 16px; text-align:center; cursor:pointer;
  transition: all .2s;
  background: repeating-linear-gradient(
    45deg, transparent, transparent 10px,
    rgba(143,206,58,.02) 10px, rgba(143,206,58,.02) 20px
  );
}
.upload-box:active { border-color: var(--gold); background: var(--gold-d); }

/* ---- LOADERS ---- */
#loader {
  position:fixed; inset:0; background: var(--bg);
  z-index:999; display:flex; align-items:center; justify-content:center;
  flex-direction:column; gap:16px;
}
.loader-grain {
  font-size: 52px;
  animation: bounce 1.2s ease-in-out infinite;
}
@keyframes bounce {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-12px); }
}
.loader-text {
  font-family: var(--f-display); font-size: 12px;
  color: var(--muted); letter-spacing: 1px;
  text-transform: uppercase;
}

/* ---- ACCESS DENIED ---- */
#access-denied {
  position:fixed; inset:0; background:var(--bg); z-index:998;
  display:none; align-items:center; justify-content:center;
  flex-direction:column; gap:16px; padding:24px; text-align:center;
}
#access-denied.show { display:flex; }

/* ---- MONTH TABLE ---- */
.month-wrap { overflow-x:auto; -webkit-overflow-scrolling:touch; }
.month-wrap table { font-size:11px; }
.month-wrap th, .month-wrap td { padding:5px 6px; }

/* ---- TOAST ---- */
#toast {
  position:fixed; bottom:82px; left:50%;
  transform: translateX(-50%) translateY(20px);
  background: linear-gradient(135deg, #2a3d14, #1e2f0f);
  border: 1px solid var(--border);
  color: var(--cream); padding:11px 20px;
  border-radius: 24px; font-size:13px; font-weight:700;
  opacity:0; transition:.25s; pointer-events:none;
  white-space:nowrap; z-index:300;
  box-shadow: 0 4px 20px rgba(0,0,0,.4);
  font-family: var(--f-body);
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* ---- STAT STRIP ---- */
.stat-strip {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 8px; margin-bottom: 10px;
}
.stat-box {
  background: var(--s1); border: 1px solid var(--border);
  border-radius: 11px; padding: 10px 10px 8px;
  text-align: center;
}
.stat-box-val {
  font-family: var(--f-display); font-size: 18px;
  font-weight: 900; color: var(--cream); line-height: 1;
}
.stat-box-lbl {
  font-size: 9px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: .5px; margin-top: 3px;
}
.stat-box-hint {
  font-size: 8px; font-weight: 700; color: var(--muted2);
  margin-top: 2px; text-transform: none; letter-spacing: 0;
}

/* ---- WHEAT DECORATION ---- */
.wheat-divider {
  text-align: center; color: var(--muted2);
  font-size: 16px; letter-spacing: 4px;
  margin: 6px 0;
}

.dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }

/* ---- SPINNER for saving ---- */
.spin { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,.2); border-top-color:currentColor; border-radius:50%; animation:sp .6s linear infinite; }
@keyframes sp { to { transform:rotate(360deg); } }

/* ---- TOGGLE SWITCH ---- */
.toggle-row {
  display:flex; align-items:center; gap:10px;
  padding:11px 0; border-bottom:1px solid rgba(58,78,39,.4);
}
.toggle-row:last-child { border:none; }
.toggle-ico { font-size:20px; flex-shrink:0; width:28px; text-align:center; }
.toggle-info { flex:1; }
.toggle-name { font-weight:700; font-size:13px; }
.toggle-sub  { font-size:10px; color:var(--muted); margin-top:2px; }
.tgl {
  position:relative; width:44px; height:24px; flex-shrink:0;
}
.tgl input { opacity:0; width:0; height:0; position:absolute; }
.tgl-track {
  position:absolute; inset:0; border-radius:12px; cursor:pointer;
  background:var(--s3); border:1px solid var(--border);
  transition: background .2s;
}
.tgl input:checked ~ .tgl-track { background:var(--lime); border-color:var(--lime); }
.tgl-thumb {
  position:absolute; top:3px; left:3px;
  width:18px; height:18px; border-radius:50%;
  background:var(--muted2); transition:.2s;
  pointer-events:none;
}
.tgl input:checked ~ .tgl-track .tgl-thumb { left:23px; background:#141a0e; }

/* ---- FEED MANAGE ROW ---- */
.feed-row {
  display:flex; align-items:center; gap:10px;
  padding:10px 0; border-bottom:1px solid rgba(58,78,39,.4);
}

<script>
// ============================================================

if (tg) { tg.ready(); tg.expand(); if (tg.colorScheme==='light') document.body.classList.add('tg-light'); }

const TG_USERNAME = TG_USER && TG_USER.username ? TG_USER.username : '';

// ============================================================
// CONFIG
// ============================================================
const SUPABASE_URL = window.SUPABASE_URL || 'https://rukqmhrhxzmiwtbepxmz.supabase.co';
const SUPABASE_KEY = window.SUPABASE_ANON_KEY || 'sb_publishable_y5vcLvwP6zO4AUXIAJp6ng_0arShMHX';

const SITES = { 'Р РЈРЎ': 'Р–Рҡ Р СғСҒСҢ', 'Р РһРЎ': 'РҡРҫРјРҝР»РөРәСҒ Р РҫСҒСҒРёР№СҒРәРёР№' };
const ROLES = { admin:'РҗРҙРјРёРҪРёСҒСӮСҖР°СӮРҫСҖ', operator:'РһРҝРөСҖР°СӮРҫСҖ', viewer:'РҹСҖРҫСҒРјРҫСӮСҖ' };
const ROLE_ICONS = { admin:'рҹ‘‘', operator:'рҹҢұ', viewer:'рҹ‘Ғ' };

// РҳРәРҫРҪРәРё РҙР»СҸ РәРҫСҖРјРҫРІ
const FEED_ICONS = {
  default:'рҹҢҫ', СҒРёР»РҫСҒ:'рҹҢҪ', СҒРөРҪР°Р¶:'рҹҢҝ', СҒРҫР»РҫРјР°:'рҹӘ№',
  РҙСҖРҫРұРёРҪР°:'рҹҚә', СҖР°РҝСҒ:'рҹҢј', СҒРҫСҸ:'рҹ«ҳ', РәСғРәСғСҖСғР·Р°:'рҹҢҪ',
  РҝР°СӮРҫРәР°:'рҹҚҜ', Р¶РјСӢС…:'рҹҘң', РјРөР»:'рҹӘЁ', СҒРҫР»СҢ:'рҹ§Ӯ',
  СҒРҫРҙР°:'вҡ—пёҸ', Р·РөСҖРҪРҫ:'рҹҢҫ', Р·РөСҖРҪРҫСҒРјРөСҒСҢ:'рҹҢҫ', РҝСҲРөРҪРёСҶР°:'рҹҢҫ',
};
function feedIco(name) {
  const n = name.toLowerCase();
  for (const [k,v] of Object.entries(FEED_ICONS)) if (n.includes(k)) return v;
  return FEED_ICONS.default;
}

// ============================================================
// PERMISSIONS
// ============================================================
const CAN = {
  settings:   r => r === 'admin',
  intake:     r => r === 'admin' || r === 'operator',
  otherSite:  (r, userSite, site) => r === 'admin' || r === 'viewer' || userSite === site,
  switchSite: r => r === 'admin' || r === 'viewer',
  manageUsers:r => r === 'admin',
};

// ============================================================
// SUPABASE
// ============================================================
function sbFetch(url, opts={}) {
  const controller = new AbortController();
  const timer = setTimeout(() => controller.abort(), 12000); // 12 СҒРөРә СӮР°Р№РјР°СғСӮ
  return fetch(url, { ...opts, signal: controller.signal })
    .finally(() => clearTimeout(timer));
}
async function sbGet(table, filter='') {
  const r = await sbFetch(`${SUPABASE_URL}/rest/v1/${table}?${filter}`, {
    headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}
  });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}
async function sbUpsert(table, data, onConflict='') {
  const conflict = onConflict ? `?on_conflict=${onConflict}` : '';
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}${conflict}`, {
    method:'POST',
    headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=minimal'},
    body:JSON.stringify(data)
  });
  if (!r.ok) throw new Error(await r.text());
}
async function sbInsert(table, data) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}`, {
    method:'POST',
    headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify(data)
  });
  if (!r.ok) throw new Error(await r.text());
}
async function sbPatch(table, filter, data) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}?${filter}`, {
    method:'PATCH',
    headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':'application/json','Prefer':'return=minimal'},
    body:JSON.stringify(data)
  });
  if (!r.ok) throw new Error(await r.text());
}

// ============================================================
// STATE
// ============================================================
const TODAY     = new Date();
const CUR_YEAR  = TODAY.getFullYear();
const CUR_MONTH = TODAY.getMonth()+1;
const CUR_DAY   = TODAY.getDate();

let curSite = 'Р РЈРЎ';
let selDay  = CUR_DAY;
let curPage = 'dash';
let ME = null;

let FEEDS=[], DAY_DATA=[], OPEN_BAL=[], EDIT_OPEN_BAL=[], LOGS=[], USERS=[], MONTHLY_NEEDS=[];
let YEAR_DAY_DATA=[], YEAR_OPEN_BAL=[], YEAR_MONTHLY_NEEDS=[];
let OB_YEAR=CUR_YEAR, OB_MONTH=CUR_MONTH;

function daysInMonth(){ return new Date(CUR_YEAR,CUR_MONTH,0).getDate(); }
function monthlyNeed(f){
  const r = MONTHLY_NEEDS.find(x=>x.feed_id===f.id&&x.site===curSite&&x.year===CUR_YEAR&&x.month===CUR_MONTH);
  if(r) return Number(r.per_month_t||0);
  const siteMonthLoaded = MONTHLY_NEEDS.some(x=>x.site===curSite&&x.year===CUR_YEAR&&x.month===CUR_MONTH);
  return siteMonthLoaded ? 0 : Number(f.per_month_t||0);
}
function dailyNorm(f){ return monthlyNeed(f)/daysInMonth(); }
function siteName(k){ return SITES[k]||k; }
// РҡРҫСҖРј РҝРҫРәР°Р·СӢРІР°РөСӮСҒСҸ РІ РҫРҝРөСҖР°СҶРёРҫРҪРҪСӢС… СҚРәСҖР°РҪР°С… (РҫСҒСӮР°СӮРәРё, РҝСҖРёС…РҫРҙ, Р¶СғСҖРҪР°Р») РўРһРӣР¬РҡРһ РөСҒР»Рё:
// 1. РҪРө Р°СҖС…РёРІРёСҖРҫРІР°РҪ РіР»РҫРұР°Р»СҢРҪРҫ (feeds.active !== false)
// 2. Р·Р°РҙР°РҪР° РҝРҫСӮСҖРөРұРҪРҫСҒСӮСҢ > 0 РҙР»СҸ СӮРөРәСғСүРөР№ РҝР»РҫСүР°РҙРәРё Рё РјРөСҒСҸСҶР°
function activeFeeds(){ return uniqueFeedsByName(FEEDS.filter(f=>f.active!==false && monthlyNeed(f)>0)); }

function getOpenBal(feedId){
  const r=OPEN_BAL.find(x=>x.feed_id===feedId&&x.site===curSite&&x.year===CUR_YEAR&&x.month===CUR_MONTH);
  return r && r.opening_balance ? r.opening_balance : 0;
}
function getEditOpenBal(feedId){
  const r=EDIT_OPEN_BAL.find(x=>x.feed_id===feedId&&x.site===curSite&&Number(x.year)===OB_YEAR&&Number(x.month)===OB_MONTH);
  return r && r.opening_balance ? r.opening_balance : 0;
}
function obPeriodValue(){
  return `${OB_YEAR}-${String(OB_MONTH).padStart(2,'0')}`;
}
async function loadEditOpenBalances(){
  EDIT_OPEN_BAL = await sbGet('opening_balances',`year=eq.${OB_YEAR}&month=eq.${OB_MONTH}&site=eq.${curSite}`);
}
function setOBPeriod(v){
  const p=(v||'').split('-').map(Number);
  if(p.length!==2 || !p[0] || !p[1]) return;
  OB_YEAR=p[0]; OB_MONTH=p[1];
  loadEditOpenBalances().then(renderSettings).catch(()=>toast('РқРө СғРҙР°Р»РҫСҒСҢ Р·Р°РіСҖСғР·РёСӮСҢ РҫСҒСӮР°СӮРәРё'));
}
function getDayRec(feedId,day){
  return DAY_DATA.find(x=>x.feed_id===feedId&&x.site===curSite&&x.year===CUR_YEAR&&x.month===CUR_MONTH&&x.day===day)||{intake:0,expense:0};
}
function getYearDayRec(feedId,year,month,day){
  return YEAR_DAY_DATA.find(x=>x.feed_id===feedId&&x.site===curSite&&Number(x.year)===year&&Number(x.month)===month&&Number(x.day)===day)||{intake:0,expense:0};
}
function getYearOpenBal(feedId,year,month){
  const r=YEAR_OPEN_BAL.find(x=>x.feed_id===feedId&&x.site===curSite&&Number(x.year)===year&&Number(x.month)===month);
  return r && r.opening_balance ? Number(r.opening_balance) : 0;
}
function getYearMonthlyNeed(feed,year,month){
  const r=YEAR_MONTHLY_NEEDS.find(x=>x.feed_id===feed.id&&x.site===curSite&&Number(x.year)===year&&Number(x.month)===month);
  if(r) return Number(r.per_month_t||0);
  if(year===CUR_YEAR&&month===CUR_MONTH) return monthlyNeed(feed);
  return Number(feed.per_month_t||0);
}
function latestYearStart(feedId,year,month){
  const candidates=YEAR_OPEN_BAL
    .filter(x=>x.feed_id===feedId&&x.site===curSite&&(Number(x.year)<year||(Number(x.year)===year&&Number(x.month)<=month)))
    .sort((a,b)=>Number(b.year)-Number(a.year)||Number(b.month)-Number(a.month));
  return candidates[0] ? {year:Number(candidates[0].year),month:Number(candidates[0].month),balance:Number(candidates[0].opening_balance||0)} : {year,month,balance:0};
}
function balEnd(feedId,day){
  const f=FEEDS.find(x=>x.id===feedId); if(!f) return 0;
  const start=latestYearStart(feedId,CUR_YEAR,CUR_MONTH);
  let bal=start.balance;
  for(let y=start.year, m=start.month; y<CUR_YEAR || (y===CUR_YEAR && m<=CUR_MONTH); ){
    const firstDay=(y===start.year&&m===start.month)?1:1;
    const lastDay=(y===CUR_YEAR&&m===CUR_MONTH)?day:new Date(y,m,0).getDate();
    const need=getYearMonthlyNeed(f,y,m);
    const norm=need/new Date(y,m,0).getDate();
    for(let d=firstDay;d<=lastDay;d++){
      const rec=getYearDayRec(feedId,y,m,d);
      bal+=(Number(rec.intake||0));
      bal-=(Number(rec.expense||0)>0?Number(rec.expense||0):norm);
      if(rec.adjustment_balance!==undefined&&rec.adjustment_balance!==null&&rec.adjustment_balance!=='') bal=Number(rec.adjustment_balance);
    }
    m++;
    if(m>12){m=1;y++;}
  }
  return bal;
}
function balEndMonth(feedId,year,month,day){
  const f=FEEDS.find(x=>x.id===feedId); if(!f) return 0;
  const start=latestYearStart(feedId,year,month);
  let bal=start.balance;
  for(let y=start.year, m=start.month; y<year || (y===year && m<=month); ){
    const lastDay=(y===year&&m===month)?day:new Date(y,m,0).getDate();
    const need=getYearMonthlyNeed(f,y,m);
    const norm=need/new Date(y,m,0).getDate();
    for(let d=1;d<=lastDay;d++){
      const rec=getYearDayRec(feedId,y,m,d);
      bal+=Number(rec.intake||0);
      bal-=(Number(rec.expense||0)>0?Number(rec.expense||0):norm);
      if(rec.adjustment_balance!==undefined&&rec.adjustment_balance!==null&&rec.adjustment_balance!=='') bal=Number(rec.adjustment_balance);
    }
    m++;
    if(m>12){m=1;y++;}
  }
  return bal;
}
function balStart(feedId,day){
  if(day<=1) return getOpenBal(feedId);
  return balEnd(feedId,day-1);
}

async function loadAll(){
  try {
    // РЎСҖР°Р·Сғ РҝРҫРәР°Р·СӢРІР°РөРј РәСҚСҲ РёР· localStorage РҝРҫРәР° РіСҖСғР·СҸСӮСҒСҸ СҒРІРөР¶РёРө РҙР°РҪРҪСӢРө
    const cachedMe = JSON.parse(localStorage.getItem('me')||'null');
    if (cachedMe) {
      ME = cachedMe;
      FEEDS    = JSON.parse(localStorage.getItem('feeds')||'[]');
      DAY_DATA = JSON.parse(localStorage.getItem('day_data')||'[]');
      OPEN_BAL = JSON.parse(localStorage.getItem('open_bal')||'[]');
      EDIT_OPEN_BAL = OPEN_BAL;
      LOGS     = JSON.parse(localStorage.getItem('logs')||'[]');
      MONTHLY_NEEDS = JSON.parse(localStorage.getItem('monthly_needs')||'[]');
      YEAR_DAY_DATA = JSON.parse(localStorage.getItem('year_day_data')||'[]');
      YEAR_OPEN_BAL = JSON.parse(localStorage.getItem('year_open_bal')||'[]');
      YEAR_MONTHLY_NEEDS = JSON.parse(localStorage.getItem('year_monthly_needs')||'[]');
      if (ME.role==='operator') curSite = ME.site || 'Р РЈРЎ';
      applyRoleUI();
      document.getElementById('loader').style.display='none';
      render();
    }

    // Р—Р°РіСҖСғР¶Р°РөРј СҒРІРөР¶РёРө РҙР°РҪРҪСӢРө РҝР°СҖР°Р»Р»РөР»СҢРҪРҫ СҒ РҝСҖРҫРІРөСҖРәРҫР№ РҝРҫР»СҢР·РҫРІР°СӮРөР»СҸ
    let users = await sbGet('app_users', `tg_id=eq.${TG_ID}`);
    if (!users || users.length === 0) {
      const allUsers = await sbGet('app_users','select=tg_id&limit=5');
      const hasOnlyBrowserUser = TG_ID > 0 && allUsers && allUsers.length === 1 && Number(allUsers[0].tg_id) === 0;
      const isFirst  = !allUsers || allUsers.length === 0 || hasOnlyBrowserUser;
      if (isFirst) {
        await sbInsert('app_users', {tg_id:TG_ID, name:TG_NAME, username:TG_USERNAME, role:'admin', site:'Р РЈРЎ'});
        users = [{tg_id:TG_ID, name:TG_NAME, username:TG_USERNAME, role:'admin', site:'Р РЈРЎ'}];
      } else {
        showAccessDenied(); return;
      }
    }
    ME = users[0];
    if (!ME.role) { showAccessDenied(); return; }
    if (ME.role==='operator') curSite = ME.site || 'Р РЈРЎ';

    // Р’СҒРө РҫСҒРҪРҫРІРҪСӢРө РҙР°РҪРҪСӢРө вҖ” РҫРҙРҪРёРј РҝР°СҖР°Р»Р»РөР»СҢРҪСӢРј РҝР°РәРөСӮРҫРј
    const [feeds, dayData, openBal, logs, monthlyNeeds, yearDayData, yearOpenBal, yearMonthlyNeeds, allUsers2] = await Promise.all([
      sbGet('feeds','order=sort_order'),
      sbGet('day_records',`year=eq.${CUR_YEAR}&month=eq.${CUR_MONTH}&site=eq.${curSite}`),
      sbGet('opening_balances',`year=eq.${CUR_YEAR}&month=eq.${CUR_MONTH}&site=eq.${curSite}`),
      sbGet('intake_log',`year=eq.${CUR_YEAR}&month=eq.${CUR_MONTH}&site=eq.${curSite}&order=created_at.desc&limit=100`),
      sbGet('monthly_needs',`year=eq.${CUR_YEAR}&month=eq.${CUR_MONTH}&site=eq.${curSite}`),
      sbGet('day_records',`year=eq.${CUR_YEAR}&site=eq.${curSite}`),
      sbGet('opening_balances',`year=eq.${CUR_YEAR}&site=eq.${curSite}`),
      sbGet('monthly_needs',`year=eq.${CUR_YEAR}&site=eq.${curSite}`),
      ME.role==='admin' ? sbGet('app_users','order=created_at') : Promise.resolve(null)
    ]);
    FEEDS=feeds||[]; DAY_DATA=dayData||[]; OPEN_BAL=openBal||[]; EDIT_OPEN_BAL=OPEN_BAL; LOGS=logs||[]; MONTHLY_NEEDS=monthlyNeeds||[];
    YEAR_DAY_DATA=yearDayData||[]; YEAR_OPEN_BAL=yearOpenBal||[]; YEAR_MONTHLY_NEEDS=yearMonthlyNeeds||[];
    if (allUsers2) USERS = allUsers2;

    // РһРұРҪРҫРІР»СҸРөРј localStorage СҒРІРөР¶РёРјРё РҙР°РҪРҪСӢРјРё
    localStorage.setItem('me', JSON.stringify(ME));
    localStorage.setItem('feeds', JSON.stringify(FEEDS));
    localStorage.setItem('day_data', JSON.stringify(DAY_DATA));
    localStorage.setItem('open_bal', JSON.stringify(OPEN_BAL));
    localStorage.setItem('logs', JSON.stringify(LOGS));
    localStorage.setItem('monthly_needs', JSON.stringify(MONTHLY_NEEDS));
    localStorage.setItem('year_day_data', JSON.stringify(YEAR_DAY_DATA));
    localStorage.setItem('year_open_bal', JSON.stringify(YEAR_OPEN_BAL));
    localStorage.setItem('year_monthly_needs', JSON.stringify(YEAR_MONTHLY_NEEDS));

    applyRoleUI();
    document.getElementById('loader').style.display='none';
    render();

    // РҗРІСӮРҫСҖРҫР»Р»РҫРІРөСҖ вҖ” РІ С„РҫРҪРө, РҪРө РұР»РҫРәРёСҖСғРөСӮ Р·Р°РіСҖСғР·РәСғ
    if (ME.role === 'admin') {
      Promise.all([autoRolloverIfNeeded('Р РЈРЎ'), autoRolloverIfNeeded('Р РһРЎ')])
        .then(async ([rolledRUS, rolledROS]) => {
          if (rolledRUS || rolledROS) {
            [OPEN_BAL, MONTHLY_NEEDS, YEAR_OPEN_BAL, YEAR_MONTHLY_NEEDS] = await Promise.all([
              sbGet('opening_balances',`year=eq.${CUR_YEAR}&month=eq.${CUR_MONTH}&site=eq.${curSite}`),
              sbGet('monthly_needs',`year=eq.${CUR_YEAR}&month=eq.${CUR_MONTH}&site=eq.${curSite}`),
              sbGet('opening_balances',`year=eq.${CUR_YEAR}&site=eq.${curSite}`),
              sbGet('monthly_needs',`year=eq.${CUR_YEAR}&site=eq.${curSite}`)
            ]);
            EDIT_OPEN_BAL = OPEN_BAL;
            localStorage.setItem('open_bal', JSON.stringify(OPEN_BAL));
            localStorage.setItem('monthly_needs', JSON.stringify(MONTHLY_NEEDS));
            localStorage.setItem('year_open_bal', JSON.stringify(YEAR_OPEN_BAL));
            localStorage.setItem('year_monthly_needs', JSON.stringify(YEAR_MONTHLY_NEEDS));
            render();
            toast('вң… РһСҒСӮР°СӮРәРё РҪР° 1-Рө СҮРёСҒР»Рҫ РҝРөСҖРөРҪРөСҒРөРҪСӢ РёР· РҝСҖРҫСҲР»РҫРіРҫ РјРөСҒСҸСҶР°');
          }
        })
        .catch(e => console.warn('Rollover error:', e));
    }
  } catch(e) {
    FEEDS    = JSON.parse(localStorage.getItem('feeds')||'[]');
    DAY_DATA = JSON.parse(localStorage.getItem('day_data')||'[]');
    OPEN_BAL = JSON.parse(localStorage.getItem('open_bal')||'[]');
    EDIT_OPEN_BAL = OPEN_BAL;
    LOGS     = JSON.parse(localStorage.getItem('logs')||'[]');
    MONTHLY_NEEDS = JSON.parse(localStorage.getItem('monthly_needs')||'[]');
    YEAR_DAY_DATA = JSON.parse(localStorage.getItem('year_day_data')||'[]');
    YEAR_OPEN_BAL = JSON.parse(localStorage.getItem('year_open_bal')||'[]');
    YEAR_MONTHLY_NEEDS = JSON.parse(localStorage.getItem('year_monthly_needs')||'[]');
    ME       = JSON.parse(localStorage.getItem('me')||'null');
    if (!ME) { showAccessDenied(); return; }
    applyRoleUI();
    document.getElementById('loader').style.display='none';
    render();
    toast('вҡ пёҸ РһС„Р»Р°Р№РҪ СҖРөР¶РёРј');
  }
  localStorage.setItem('me', JSON.stringify(ME));
}

// ============================================================
// AUTO MONTH ROLLOVER
// Р•СҒР»Рё РҪР° РҪР°СҮР°Р»Рҫ СӮРөРәСғСүРөРіРҫ РјРөСҒСҸСҶР° РҪРөСӮ РҫСҒСӮР°СӮРәРҫРІ вҖ” СҒСҮРёСӮР°РөРј РёР· РәРҫРҪСҶР° РҝСҖРөРҙСӢРҙСғСүРөРіРҫ
// ============================================================
async function autoRolloverIfNeeded(site) {
  const existing = await sbGet('opening_balances', `year=eq.${CUR_YEAR}&month=eq.${CUR_MONTH}&site=eq.${site}&limit=1`);
  if (existing.length > 0) return false;

  let prevYear = CUR_YEAR, prevMonth = CUR_MONTH - 1;
  if (prevMonth < 1) { prevMonth = 12; prevYear--; }

  const [prevOpenBal, prevDayRecords, prevNeeds, prevFeeds, existingNeeds] = await Promise.all([
    sbGet('opening_balances', `year=eq.${prevYear}&month=eq.${prevMonth}&site=eq.${site}`),
    sbGet('day_records', `year=eq.${prevYear}&month=eq.${prevMonth}&site=eq.${site}`),
    sbGet('monthly_needs', `year=eq.${prevYear}&month=eq.${prevMonth}&site=eq.${site}`),
    sbGet('feeds', 'select=id,name,active&active=is.true&order=sort_order'),
    sbGet('monthly_needs', `year=eq.${CUR_YEAR}&month=eq.${CUR_MONTH}&site=eq.${site}&limit=1`)
  ]);

  if (!prevOpenBal.length && !prevDayRecords.length) return false;

  const daysInPrev = new Date(prevYear, prevMonth, 0).getDate();
  const obRows = [];

  for (const feed of prevFeeds) {
    const openBal   = Number((prevOpenBal.find(x => x.feed_id === feed.id) || {}).opening_balance || 0);
    const need      = Number((prevNeeds.find(x => x.feed_id === feed.id) || {}).per_month_t || 0);
    const dailyNorm = daysInPrev > 0 ? need / daysInPrev : 0;
    let balance = openBal;
    for (let d = 1; d <= daysInPrev; d++) {
      const rec = prevDayRecords.find(x => x.feed_id === feed.id && Number(x.day) === d);
      balance += Number((rec || {}).intake  || 0);
      balance -= Number((rec || {}).expense || 0) > 0 ? Number(rec.expense) : dailyNorm;
      if (rec && rec.adjustment_balance !== null && rec.adjustment_balance !== undefined)
        balance = Number(rec.adjustment_balance);
    }
    obRows.push({ feed_id: feed.id, site, year: CUR_YEAR, month: CUR_MONTH, opening_balance: Math.round(balance * 1000) / 1000 });
  }

  // РһРҙРёРҪ Р·Р°РҝСҖРҫСҒ РҙР»СҸ РІСҒРөС… РҫСҒСӮР°СӮРәРҫРІ + РҫРҙРёРҪ РҙР»СҸ РІСҒРөС… РҝРҫСӮСҖРөРұРҪРҫСҒСӮРөР№
  const saves = [sbUpsert('opening_balances', obRows, 'feed_id,site,year,month')];
  if (!existingNeeds.length && prevNeeds.length) {
    const mnRows = prevNeeds.map(n => ({ feed_id: n.feed_id, site, year: CUR_YEAR, month: CUR_MONTH, per_month_t: n.per_month_t }));
    saves.push(sbUpsert('monthly_needs', mnRows, 'feed_id,site,year,month'));
  }
  await Promise.all(saves);
  return true;
}

async function doIntake(){
  if (!CAN.intake(ME && ME.role)) { toast('рҹ”’ РқРөСӮ РҝСҖР°РІ'); return; }
  const dateVal=document.getElementById('iDate').value;
  const dateParts=(dateVal||'').split('-').map(Number);
  if(dateParts.length!==3 || !dateParts[0] || !dateParts[1] || !dateParts[2]){toast('Р’СӢРұРөСҖРёСӮРө РҙР°СӮСғ');return;}
  const intakeYear=dateParts[0], intakeMonth=dateParts[1], day=dateParts[2];
  const feedId=document.getElementById('iFeed').value;
  const amt=parseFloat(document.getElementById('iAmt').value);
  const note=document.getElementById('iNote').value.trim();
  const msg=document.getElementById('intake-msg');
  if(!amt||amt<=0){msg.innerHTML=`<div class="alert alert-err">вҡ пёҸ Р’РІРөРҙРёСӮРө РәРҫР»РёСҮРөСҒСӮРІРҫ</div>`;return;}
  const feed=FEEDS.find(f=>f.id===feedId);
  msg.innerHTML=`<div class="alert alert-info"><span class="spin"></span> РЎРҫС…СҖР°РҪРөРҪРёРө...</div>`;
  try{
    const found=await sbGet('day_records',`feed_id=eq.${feedId}&site=eq.${curSite}&year=eq.${intakeYear}&month=eq.${intakeMonth}&day=eq.${day}&limit=1`);
    const existing=(found&&found[0])||{intake:0,expense:0};
    await sbUpsert('day_records',{feed_id:feedId,site:curSite,year:intakeYear,month:intakeMonth,day,intake:(Number(existing.intake||0))+amt,expense:existing.expense||0},'feed_id,site,year,month,day');
    await sbInsert('intake_log',{feed_id:feedId,feed_name:feed.name,site:curSite,year:intakeYear,month:intakeMonth,day,user_name:ME && ME.name ? ME.name : TG_NAME,user_role:ME && ME.role,amount:amt,note});
    await reloadDayData(true);
    document.getElementById('iAmt').value='';
    document.getElementById('iNote').value='';
    msg.innerHTML=`<div class="alert alert-ok">вң… ${fmt(amt)} СӮ В· ${feed.name}</div>`;
    setTimeout(()=>{if(msg)msg.innerHTML='';},3000);
    toast('вң… РҹСҖРёС…РҫРҙ СҒРҫС…СҖР°РҪС‘РҪ');
    if(tg)tg.HapticFeedback && tg.HapticFeedback.notificationOccurred('success');
  }catch(e){msg.innerHTML=`<div class="alert alert-err">вқҢ РһСҲРёРұРәР°: ${e.message}</div>`;}
}

function parseDateInput(v){
  const p=(v||'').split('-').map(Number);
  if(p.length!==3 || !p[0] || !p[1] || !p[2]) return null;
  return new Date(p[0],p[1]-1,p[2]);
}
function dateKey(d){
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function monthRange(from,to){
  const out=[];
  const d=new Date(from.getFullYear(),from.getMonth(),1);
  while(d<=to){
    out.push({year:d.getFullYear(),month:d.getMonth()+1});
    d.setMonth(d.getMonth()+1);
  }
  return out;
}
function periodNeed(feed, needs, y, m){
  const r=needs.find(x=>x.feed_id===feed.id&&x.site===curSite&&Number(x.year)===y&&Number(x.month)===m);
  return r ? Number(r.per_month_t||0) : Number(feed.per_month_t||0);
}
function periodOpen(feedId, opens, y, m){
  const r=opens.find(x=>x.feed_id===feedId&&x.site===curSite&&Number(x.year)===y&&Number(x.month)===m);
  return r ? Number(r.opening_balance||0) : 0;
}
function periodRec(feedId, records, y, m, d){
  return records.find(x=>x.feed_id===feedId&&x.site===curSite&&Number(x.year)===y&&Number(x.month)===m&&Number(x.day)===d)||{intake:0,expense:0};
}
async function loadPeriodData(from,to){
  const months=monthRange(from,to);
  const packs=await Promise.all(months.map(async m=>{
    const [records, opens, needs]=await Promise.all([
      sbGet('day_records',`year=eq.${m.year}&month=eq.${m.month}&site=eq.${curSite}`),
      sbGet('opening_balances',`year=eq.${m.year}&month=eq.${m.month}&site=eq.${curSite}`),
      sbGet('monthly_needs',`year=eq.${m.year}&month=eq.${m.month}&site=eq.${curSite}`)
    ]);
    return {records:records||[], opens:opens||[], needs:needs||[]};
  }));
  return {
    records:packs.flatMap(p=>p.records),
    opens:packs.flatMap(p=>p.opens),
    needs:packs.flatMap(p=>p.needs)
  };
}
function periodReportRows(from,to,data){
  return FEEDS
    .filter(f=>f.active!==false)
    .map(f=>{
      let opening=periodOpen(f.id,data.opens,from.getFullYear(),from.getMonth()+1);
      let intake=0, expense=0, touched=false;
      for(let d=new Date(from.getFullYear(),from.getMonth(),1); d<=to; d.setDate(d.getDate()+1)){
        const y=d.getFullYear(), m=d.getMonth()+1, day=d.getDate();
        const need=periodNeed(f,data.needs,y,m);
        const norm=need/(new Date(y,m,0).getDate());
        const rec=periodRec(f.id,data.records,y,m,day);
        const recIntake=Number(rec.intake||0);
        const recExpense=Number(rec.expense||0)>0 ? Number(rec.expense||0) : norm;
        if(need>0 || recIntake>0 || Number(rec.expense||0)>0) touched=true;
        if(d<from){
          opening += recIntake - recExpense;
        }else{
          intake += recIntake;
          expense += recExpense;
        }
      }
      const ending=Math.max(0, opening + intake - expense);
      return {name:f.name, opening, intake, expense, ending, touched};
    })
    .filter(r=>r.touched || r.opening>0 || r.intake>0 || r.expense>0 || r.ending>0);
}

function loadXLSXLib(){
  return new Promise((resolve,reject)=>{
    if(window.XLSX){resolve();return;}
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=resolve; s.onerror=reject;
    document.head.appendChild(s);
  });
}
async function downloadMonthReport(){
  try{
    if(!window.XLSX){toast('Р—Р°РіСҖСғР¶Р°СҺ Excel...');await loadXLSXLib();}
    const from=parseDateInput(document.getElementById('repFrom') && document.getElementById('repFrom').value);
    const to=parseDateInput(document.getElementById('repTo') && document.getElementById('repTo').value);
    if(!from || !to){toast('Р’СӢРұРөСҖРёСӮРө РҝРөСҖРёРҫРҙ');return;}
    if(from>to){toast('Р”Р°СӮР° РҪР°СҮР°Р»Р° РұРҫР»СҢСҲРө РҙР°СӮСӢ РҫРәРҫРҪСҮР°РҪРёСҸ');return;}
    toast('Р“РҫСӮРҫРІР»СҺ РҫСӮСҮРөСӮ...');
    const data=await loadPeriodData(from,to);
    const rows=periodReportRows(from,to,data);
    if(!rows.length){toast('РқРөСӮ РҙР°РҪРҪСӢС… РҙР»СҸ РҫСӮСҮРөСӮР°');return;}
    const round=v=>Math.round(Number(v||0)*1000)/1000;
    const aoa=[
      ['РҹР»РҫСүР°РҙРәР°', siteName(curSite)],
      ['РҹРөСҖРёРҫРҙ', `${dateKey(from)} вҖ” ${dateKey(to)}`],
      [],
      ['РҳРҪРіСҖРөРҙРёРөРҪСӮ','РһСҒСӮР°СӮРҫРә РҪР° РҪР°СҮР°Р»Рҫ РҝРөСҖРёРҫРҙР°, СӮ','РҹСҖРёС…РҫРҙ Р·Р° РҝРөСҖРёРҫРҙ, СӮ','Р Р°СҒС…РҫРҙ Р·Р° РҝРөСҖРёРҫРҙ, СӮ','РһСҒСӮР°СӮРҫРә РҪР° РәРҫРҪРөСҶ РҝРөСҖРёРҫРҙР°, СӮ']
    ];
    rows.forEach(r=>aoa.push([r.name, round(r.opening), round(r.intake), round(r.expense), round(r.ending)]));
    const ws=XLSX.utils.aoa_to_sheet(aoa);
    ws['!cols']=[{wch:34},{wch:24},{wch:18},{wch:18},{wch:26}];
    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'Р”РІРёР¶РөРҪРёРө');
    const site=siteName(curSite).replace(/[\\/:*?"<>|]/g,'_');
    XLSX.writeFile(wb,`Р”РІРёР¶РөРҪРёРө РәРҫСҖРјРҫРІ ${site} ${dateKey(from)}_${dateKey(to)}.xlsx`);
  }catch(e){
    toast('РқРө СғРҙР°Р»РҫСҒСҢ СҒРәР°СҮР°СӮСҢ РҫСӮСҮРөСӮ');
  }
}

async function saveOB(){

    if(!el || el.value==='') return null;
    const val=parseFloat(el.value);
    const original=parseFloat(el.dataset.original||'0');
    if(isNaN(val) || val===original) return null;
    return {feed_id:f.id,site:curSite,year:OB_YEAR,month:OB_MONTH,opening_balance:val};
  }).filter(Boolean);
  if(!rows.length){toast('РқРөСӮ РҪРҫРІСӢС… РҫСҒСӮР°СӮРәРҫРІ РҙР»СҸ СҒРҫС…СҖР°РҪРөРҪРёСҸ');return;}

  }catch(e){toast('вқҢ '+e.message);}
}

function normFeedName(name){
  return String(name||'')
    .trim()
    .toLowerCase()
    .replace(/С‘/g,'Рө')
    .replace(/\s+/g,' ')
    .replace(/[.,;:]+$/g,'');
}
function findExistingFeedByName(name){
  const key=normFeedName(name);
  return FEEDS.find(f=>normFeedName(f.name)===key);
}
function uniqueFeedsByName(list){
  const seen=new Set();
  return list.filter(f=>{
    const key=normFeedName(f.name);
    if(seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}
function makeFeedId(name){
  const map={
    'СҲСҖРҫСӮ СҒРҫРөРІСӢР№':'shrot_soy','СҒРҫСҸ СҚРәСҒСӮСҖСғРҙРёСҖРҫРІР°РҪРҪР°СҸ':'soya_extr','РәСғРәСғСҖСғР·Р°':'kukuruza','РјРөР»':'mel','РҝР°СӮРҫРәР°':'patoka','СҲСҖРҫСӮ СҖР°РҝСҒРҫРІСӢР№':'shrot_raps','РҝРёРІРҪР°СҸ РҙСҖРҫРұРёРҪР°':'piv_drobina','Р»СҢРҪСҸРҪРҫР№ Р¶РјСӢС…':'lnyanoy','СҒРҫР»СҢ':'sol','СҒРҫРҙР° (РұРёРәР°СҖРұРҫРҪР°Рҙ РҪР°СӮСҖРёСҸ)':'soda','СҒРҫРҙР° (РұРёРәР°СҖРұРҫРҪР°СӮ РҪР°СӮСҖРёСҸ)':'soda','РјРҫР»РҫРәРҫ':'moloko','Р·СҶРј':'zcm','РәРөСӮРҫСҒСӮРҫРҝ':'ketostop','С„СғРҪРіРёСҒСӮР°СӮ':'fungistat','СҒР°С„ 100':'saf_100','РјРёР»РәР°СҶРёРҙ':'milkacid','РҙР°Р№СҖРё РІРёРІ':'dairy_viv','РҫРәСҒРёРҙ РјР°РіРҪРёСҸ':'oksid_magniya','Р°РіСҖРҫРәСӮРёРјР° Р°РҪРёРҫРҪ':'agroktima_anion','РҪСғСӮСҖРёСҒСӮР°СҖ Р»Р°РәСӮ. РөРІСҖРҫРҝСҖРөРјРёРәСҒ':'nutristar_lakt','РҪСғСӮСҖРёСҒСӮР°СҖ СҒСғС…РҫСҒ. РөРІСҖРҫРҝСҖРөРјРёРәСҒ':'nutristar_suhos','РәРә СҒСӮР°СҖСӮРөСҖ(РұРҫРіРҙР°РҪ)':'kk_starter_bogdan'
  };
  const key=normFeedName(name);
  if(map[key]) return map[key];
  return 'f_'+key.replace(/[^Р°-СҸa-z0-9]/gi,'_').replace(/^_+|_+$/g,'').slice(0,32);
}

function parseExcelFeeds(rows){
  let hdrRow=-1,colM=-1;
  for(let r=0;r<rows.length;r++){
    for(let c=0;c<(rows[r]||[]).length;c++){
      const cell=String(rows[r][c]||'').toLowerCase();
      if(cell.includes('РёСӮРҫРіРҫ Р·Р° РјРөСҒ') || cell.includes('СӮ/РјРөСҒ') || cell.includes('РҝРҫСӮСҖРөРұРҪРҫСҒСӮСҢ')){hdrRow=r;colM=c;}
    }
    if(hdrRow>=0)break;
  }
  const startRow=hdrRow>=0?hdrRow+1:0;
  const needCol=hdrRow>=0?colM:1;
  const newFeeds=[];const seen=new Set();
  for(let r=startRow;r<rows.length;r++){
    const row=rows[r]||[];
    const name=String(row[0]||'').trim();
    if(!name||/^РёСӮРҫРіРҫ/i.test(name))continue;
    const pm=parseFloat(String(row[needCol]||'').replace(',','.'));
    if(!isNaN(pm)&&pm>0&&pm<5000){
      const key=normFeedName(name);
      const existing=findExistingFeedByName(name);
      if(!seen.has(key)){seen.add(key);newFeeds.push({id:existing?existing.id:makeFeedId(name),name:existing?existing.name:name,per_month_t:Math.round(pm*1000)/1000});}
    }
  }
  return newFeeds;
}

async function loadXLS(file){
  if(!file)return;
  const msg=document.getElementById('xls-msg'),preview=document.getElementById('xls-preview');
  msg.innerHTML=`<div class="alert alert-info"><span class="spin"></span> Р—Р°РіСҖСғР¶Р°СҺ РҝР°СҖСҒРөСҖ...</div>`;
  await loadXLSXLib();
  msg.innerHTML=`<div class="alert alert-info"><span class="spin"></span> Р§РёСӮР°РөРј С„Р°Р№Р»...</div>`;
  const reader=new FileReader();
  reader.onload=async e=>{
    try{
      const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
      const sheetName=wb.SheetNames.find(n=>/2.?СҖР°СҶ/i.test(n.replace(/[\s-]/g,''))) || wb.SheetNames[0];
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[sheetName],{header:1,defval:null});
      const newFeeds=parseExcelFeeds(rows);
      if(!newFeeds.length){msg.innerHTML=`<div class="alert alert-err">РқРө РҪР°Р№РҙРөРҪРҫ РәРҫСҖРјРҫРІ. РқСғР¶РҪСӢ: РҪР°Р·РІР°РҪРёРө РІ РәРҫР»РҫРҪРәРө A, РҝРҫСӮСҖРөРұРҪРҫСҒСӮСҢ РІ РәРҫР»РҫРҪРәРө B.</div>`;return;}
      let prev=`<div class="sec" style="margin-top:8px"><div class="sec-head"><span class="ico">рҹҢҫ</span>РқР°Р№РҙРөРҪРҫ ${newFeeds.length} РәРҫСҖРјРҫРІ</div>
        <div style="padding:0"><table class="tbl"><thead><tr><th>РҡРҫСҖРј</th><th>СӮ/РјРөСҒ</th></tr></thead><tbody>`;
      newFeeds.forEach(f=>{prev+=`<tr><td class="tname">${feedIco(f.name)} ${f.name}</td><td class="mono" style="color:var(--lime)">${fmt(f.per_month_t)}</td></tr>`;});
      prev+=`</tbody></table></div><div style="padding:12px"><button class="btn btn-gold" onclick='applyXLS(${JSON.stringify(JSON.stringify(newFeeds))})'>вң… РҹСҖРёРјРөРҪРёСӮСҢ</button></div></div>`;
      preview.innerHTML=prev;
      msg.innerHTML=`<div class="alert alert-ok">рҹҢҫ РҹСҖРҫРІРөСҖСҢСӮРө Рё РҪР°Р¶РјРёСӮРө РҹСҖРёРјРөРҪРёСӮСҢ</div>`;
    }catch(err){msg.innerHTML=`<div class="alert alert-err">вқҢ РһСҲРёРұРәР°: ${err.message}</div>`;}
  };
  reader.readAsArrayBuffer(file);
}

async function applyXLS(jsonStr){
  const newFeeds=JSON.parse(jsonStr);
  const msg=document.getElementById('xls-msg');
  msg.innerHTML=`<div class="alert alert-info"><span class="spin"></span> РЎРҫС…СҖР°РҪРөРҪРёРө...</div>`;
  try{
    const activeIds=newFeeds.map(f=>f.id);
    for(let i=0;i<newFeeds.length;i++){
      const f=newFeeds[i];
      await sbUpsert('feeds',{id:f.id,name:f.name,unit:'СӮ',per_month_t:f.per_month_t,sort_order:i+1,active:true});
      await sbUpsert('monthly_needs',{feed_id:f.id,site:curSite,year:CUR_YEAR,month:CUR_MONTH,per_month_t:f.per_month_t},'feed_id,site,year,month');
    }
    for(const old of FEEDS){
      if(!activeIds.includes(old.id)) await sbUpsert('monthly_needs',{feed_id:old.id,site:curSite,year:CUR_YEAR,month:CUR_MONTH,per_month_t:0},'feed_id,site,year,month');
    }
    FEEDS=await sbGet('feeds','order=sort_order');
    MONTHLY_NEEDS=await sbGet('monthly_needs',`year=eq.${CUR_YEAR}&month=eq.${CUR_MONTH}&site=eq.${curSite}`);
    localStorage.setItem('feeds',JSON.stringify(FEEDS));
    localStorage.setItem('monthly_needs',JSON.stringify(MONTHLY_NEEDS));
    document.getElementById('xls-preview').innerHTML='';
    msg.innerHTML=`<div class="alert alert-ok">вң… РҹСҖРёРјРөРҪРөРҪРҫ ${newFeeds.length} РәРҫСҖРјРҫРІ</div>`;
    toast('рҹҢҫ РҡРҫСҖРјР° РҫРұРҪРҫРІР»РөРҪСӢ');
    renderSettings();
  }catch(e){msg.innerHTML=`<div class="alert alert-err">вқҢ РһСҲРёРұРәР°: ${e.message}</div>`;}
}
